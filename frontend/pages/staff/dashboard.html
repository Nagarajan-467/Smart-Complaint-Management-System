<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Dashboard — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-list-task"></i></div>
          <div><div class="fw-bold fs-4" id="statAssigned">—</div><div class="text-muted small">Assigned to Me</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-arrow-repeat"></i></div>
          <div><div class="fw-bold fs-4" id="statInProgress">—</div><div class="text-muted small">In Progress</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="bi bi-exclamation-octagon"></i></div>
          <div><div class="fw-bold fs-4" id="statEscalated">—</div><div class="text-muted small">Escalated</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle"></i></div>
          <div><div class="fw-bold fs-4" id="statResolved">—</div><div class="text-muted small">Resolved</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Active Complaints -->
  <div class="card table-card">
    <div class="card-header bg-white d-flex align-items-center justify-content-between py-3">
      <h6 class="mb-0 fw-bold">My Active Complaints</h6>
      <a href="assigned-complaints.html" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr><th>#</th><th>Title</th><th>Priority</th><th>Status</th><th>Date</th><th></th></tr>
          </thead>
          <tbody id="activeTable"></tbody>
        </table>
      </div>
    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  (async () => {
    try {
      // Ensure components are initialized before accessing utils
      const user = await SCMComponents.init('Staff Dashboard', ['staff']);
      if (!user) return;

      const { showToast, priorityBadge, statusBadge, formatDateShort } = SCMUtils;

    try {
      // Load all complaints visible to staff (all complaints)
      const data = await API.listComplaints({ page: 1, size: 100 });
      const all = data.items || [];

      // Filter by assigned_to = current staff user
      const mine = all.filter(c => c.assigned_to === user.id);
      document.getElementById('statAssigned').textContent   = mine.filter(c => c.status === 'assigned').length;
      document.getElementById('statInProgress').textContent = mine.filter(c => c.status === 'in_progress').length;
      document.getElementById('statEscalated').textContent  = all.filter(c => c.status === 'escalated').length;
      document.getElementById('statResolved').textContent   = mine.filter(c => c.status === 'resolved').length;

      const active = mine.filter(c => !['resolved', 'closed'].includes(c.status)).slice(0, 8);
      const tbody = document.getElementById('activeTable');
      if (!active.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="bi bi-inbox"></i><p>No active assignments</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = active.map(c => `
        <tr>
          <td class="text-muted small">#${c.id}</td>
          <td>${c.title}</td>
          <td>${priorityBadge(c.priority)}</td>
          <td>${statusBadge(c.status)}</td>
          <td class="text-muted small">${formatDateShort(c.created_at)}</td>
          <td><a href="resolve-complaint.html?id=${c.id}" class="btn btn-sm btn-primary">Resolve</a></td>
        </tr>`).join('');
    } catch (err) {
      if (typeof showToast === 'function') {
        showToast(err.detail || 'Failed to load data.', 'danger');
      } else {
        console.error('Failed to load data:', err);
      }
    }
    } catch (err) {
      console.error('Page initialization error:', err);
    }
  })();
</script>
</body>
</html>
