<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resolve Complaint — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">

      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="assigned-complaints.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        <h5 class="mb-0 fw-bold">Resolve Complaint</h5>
      </div>

      <div id="loadingState" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

      <div id="mainContent" class="d-none">
        <!-- Complaint summary -->
        <div class="card table-card mb-3">
          <div class="card-body">
            <h6 class="fw-bold" id="cTitle"></h6>
            <div class="d-flex flex-wrap gap-2 mb-2" id="cBadges"></div>
            <p class="text-muted small mb-1"><i class="bi bi-geo-alt me-1"></i><span id="cLocation"></span></p>
            <p id="cDescription" class="mb-0 small"></p>
          </div>
        </div>

        <!-- Update form -->
        <div class="card table-card">
          <div class="card-header bg-white py-3">
            <h6 class="mb-0 fw-bold"><i class="bi bi-wrench me-2 text-primary"></i>Update Status</h6>
          </div>
          <div class="card-body">
            <form id="resolveForm" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">New Status <span class="text-danger">*</span></label>
                <select class="form-select" id="newStatus" required>
                  <option value="">— Select status —</option>
                  <option value="in_progress">In Progress</option>
                  <option value="resolved">Resolved</option>
                  <option value="closed">Closed</option>
                </select>
                <div class="invalid-feedback">Please select a status.</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Priority Override</label>
                <select class="form-select" id="newPriority">
                  <option value="">— Keep current —</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Resolution Notes</label>
                <textarea class="form-control" id="resolutionNotes" rows="4" placeholder="Describe what was done to resolve the issue…"></textarea>
                <div class="form-text">Required when status is set to Resolved or Closed.</div>
              </div>

              <div id="formAlert" class="alert d-none"></div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success fw-semibold" id="submitBtn">
                  <span id="btnText"><i class="bi bi-check-circle me-1"></i>Update Complaint</span>
                  <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                </button>
                <a href="assigned-complaints.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  (async () => {
    try {
      const user = await SCMComponents.init('Resolve Complaint', ['staff', 'admin']);
      if (!user) return;
      const { showToast, priorityBadge, statusBadge } = SCMUtils;
  let complaint = null;



    const id = SCMUtils.getParam('id');
    if (!id) { showToast('No complaint ID.', 'danger'); return; }

    try {
      complaint = await API.getComplaint(id);
      document.getElementById('cTitle').textContent       = `#${complaint.id} — ${complaint.title}`;
      document.getElementById('cBadges').innerHTML        = statusBadge(complaint.status) + ' ' + priorityBadge(complaint.priority);
      document.getElementById('cLocation').textContent    = complaint.location || 'No location specified';
      document.getElementById('cDescription').textContent = complaint.description;
      document.getElementById('loadingState').classList.add('d-none');
      document.getElementById('mainContent').classList.remove('d-none');
    } catch (err) {
      showToast(err.detail || 'Failed to load complaint.', 'danger');
      return;
    }

    document.getElementById('resolveForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');

      const newStatus   = document.getElementById('newStatus').value;
      const newPriority = document.getElementById('newPriority').value;
      const notes       = document.getElementById('resolutionNotes').value.trim();
      const alertEl     = document.getElementById('formAlert');

      if (!newStatus) return;

      if (['resolved', 'closed'].includes(newStatus) && !notes) {
        alertEl.className = 'alert alert-warning';
        alertEl.textContent = 'Resolution notes are required when closing or resolving a complaint.';
        alertEl.classList.remove('d-none');
        return;
      }
      alertEl.classList.add('d-none');

      const payload = { status: newStatus };
      if (notes) payload.resolution_notes = notes;
      if (newPriority) payload.priority = newPriority;

      document.getElementById('btnText').innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Updating…';
      document.getElementById('btnSpinner').classList.remove('d-none');
      document.getElementById('submitBtn').disabled = true;

      try {
        await API.updateComplaint(complaint.id, payload);
        showToast('Complaint updated successfully!', 'success');
        setTimeout(() => location.href = 'assigned-complaints.html', 1200);
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.detail || 'Update failed.';
        alertEl.classList.remove('d-none');
        document.getElementById('btnText').innerHTML = '<i class="bi bi-check-circle me-1"></i>Update Complaint';
        document.getElementById('btnSpinner').classList.add('d-none');
        document.getElementById('submitBtn').disabled = false;
      }
    });
  })();
</script>
</body>
</html>
