<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
  <style>
    .star-btn { font-size: 2rem; cursor: pointer; color: #dee2e6; background: none; border: none; padding: 0 4px; transition: color .15s; }
    .star-btn.active, .star-btn:hover ~ .star-btn { color: #ffc107; }
    .star-btn.active ~ .star-btn { color: #dee2e6; }
    #starRow:hover .star-btn { color: #ffc107; }
    #starRow .star-btn:hover ~ .star-btn { color: #dee2e6; }
  </style>
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-7">

      <div class="alert alert-info d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-info-circle-fill"></i>
        <span>You can submit feedback for your <strong>resolved</strong> complaints.</span>
      </div>

      <!-- Resolved complaints list -->
      <div class="card table-card mb-3">
        <div class="card-header bg-white py-3">
          <h6 class="mb-0 fw-bold">Select a Resolved Complaint</h6>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>#</th><th>Title</th><th>Resolved On</th><th></th></tr>
              </thead>
              <tbody id="resolvedTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Feedback form (hidden until complaint selected) -->
      <div class="card table-card d-none" id="feedbackCard">
        <div class="card-header bg-white py-3">
          <h6 class="mb-0 fw-bold"><i class="bi bi-star me-2 text-warning"></i>Submit Feedback</h6>
        </div>
        <div class="card-body">
          <p class="text-muted small mb-3">
            Complaint: <strong id="selectedTitle"></strong>
          </p>

          <div class="mb-3">
            <label class="form-label fw-semibold">Rating <span class="text-danger">*</span></label>
            <div id="starRow" class="d-flex flex-row-reverse justify-content-end">
              <button type="button" class="star-btn" data-val="5"><i class="bi bi-star-fill"></i></button>
              <button type="button" class="star-btn" data-val="4"><i class="bi bi-star-fill"></i></button>
              <button type="button" class="star-btn" data-val="3"><i class="bi bi-star-fill"></i></button>
              <button type="button" class="star-btn" data-val="2"><i class="bi bi-star-fill"></i></button>
              <button type="button" class="star-btn" data-val="1"><i class="bi bi-star-fill"></i></button>
            </div>
            <div class="text-muted small mt-1" id="ratingLabel">Click a star to rate</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Comment</label>
            <textarea class="form-control" id="feedbackComment" rows="3" placeholder="Optional comment…" maxlength="1000"></textarea>
          </div>

          <div id="feedbackAlert" class="alert d-none"></div>

          <div class="alert alert-warning d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>The feedback submission API (POST /feedbacks) will be available in a future module. Ratings are displayed here as a preview.</span>
          </div>

          <button class="btn btn-primary" id="submitFeedback">
            <i class="bi bi-send me-1"></i>Submit Feedback
          </button>
          <button class="btn btn-outline-secondary ms-2" onclick="document.getElementById('feedbackCard').classList.add('d-none')">Cancel</button>
        </div>
      </div>

    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  const { showToast, formatDateShort } = SCMUtils;
  let selectedComplaintId = null;
  let selectedRating = 0;

  // Star rating
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedRating = parseInt(btn.dataset.val);
      document.querySelectorAll('.star-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.val) <= selectedRating);
      });
      const labels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
      document.getElementById('ratingLabel').textContent = labels[selectedRating] || '';
    });
  });

  function selectComplaint(id, title) {
    selectedComplaintId = id;
    document.getElementById('selectedTitle').textContent = `#${id} — ${title}`;
    document.getElementById('feedbackCard').classList.remove('d-none');
    document.getElementById('feedbackCard').scrollIntoView({ behavior: 'smooth' });
    selectedRating = 0;
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('ratingLabel').textContent = 'Click a star to rate';
    document.getElementById('feedbackComment').value = '';
  }

  document.getElementById('submitFeedback').addEventListener('click', () => {
    if (!selectedRating) { showToast('Please select a rating.', 'warning'); return; }
    // API endpoint is not yet implemented — show preview only
    showToast(`Feedback (${selectedRating}★) recorded for complaint #${selectedComplaintId}. Full API coming in a future module.`, 'info');
    document.getElementById('feedbackCard').classList.add('d-none');
  });



    try {
      const data = await API.listComplaints({ page: 1, size: 100, status: 'resolved' });
      const resolved = data.items || [];
      const tbody = document.getElementById('resolvedTable');
      if (!resolved.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="bi bi-check2-all"></i><p>No resolved complaints yet</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = resolved.map(c => `
        <tr>
          <td class="text-muted small">#${c.id}</td>
          <td>${c.title}</td>
          <td class="text-muted small">${formatDateShort(c.resolved_at || c.updated_at)}</td>
          <td><button class="btn btn-sm btn-outline-primary" onclick="selectComplaint(${c.id}, '${c.title.replace(/'/g, "\\'")}')">Rate</button></td>
        </tr>`).join('');
    } catch (err) {
      showToast(err.detail || 'Failed to load complaints.', 'danger');
    }
  })();
</script>
</body>
</html>
