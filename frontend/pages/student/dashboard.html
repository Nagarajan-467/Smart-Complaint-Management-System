<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">

  <!-- Sidebar placeholder — filled by components.js -->
  <div class="scm-sidebar" id="scm-sidebar"></div>

  <!-- Main -->
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between"
         id="scm-navbar"></nav>

    <div class="scm-content">

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-hourglass-split"></i></div>
              <div><div class="fw-bold fs-4" id="statPending">—</div><div class="text-muted small">Pending</div></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-arrow-repeat"></i></div>
              <div><div class="fw-bold fs-4" id="statInProgress">—</div><div class="text-muted small">In Progress</div></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle"></i></div>
              <div><div class="fw-bold fs-4" id="statResolved">—</div><div class="text-muted small">Resolved</div></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-collection"></i></div>
              <div><div class="fw-bold fs-4" id="statTotal">—</div><div class="text-muted small">Total</div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Banner -->
      <div class="card border-0 rounded-3 p-3 mb-4"
           style="background:linear-gradient(135deg,#4e9af1,#2d4a6e);color:#fff;">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h5 class="fw-bold mb-1">Have an issue to report?</h5>
            <p class="mb-0 small opacity-75">Our AI engine will auto-categorize and prioritize it.</p>
          </div>
          <a href="/frontend/pages/student/create-complaint.html" class="btn btn-light fw-semibold">
            <i class="bi bi-plus-circle me-1"></i>New Complaint
          </a>
        </div>
      </div>

      <!-- Recent Complaints -->
      <div class="card table-card">
        <div class="card-header bg-white d-flex align-items-center justify-content-between py-3">
          <h6 class="mb-0 fw-bold">My Recent Complaints</h6>
          <a href="/frontend/pages/student/complaint-history.html" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>#</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Date</th><th></th></tr>
              </thead>
              <tbody id="recentTable">
                <tr><td colspan="7" class="text-center py-4">
                  <div class="spinner-border spinner-border-sm text-primary"></div>
                  <span class="ms-2 text-muted small">Loading…</span>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /.scm-content -->
  </div><!-- /.scm-main -->
</div><!-- /.scm-wrapper -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
(async () => {
  try {
    const user = await SCMComponents.init('Dashboard', ['student']);
    if (!user) return;

    const { showToast, priorityBadge, statusBadge, formatDateShort } = SCMUtils;

  try {
    const data  = await API.listComplaints({ page: 1, size: 50 });
    const items = data.items || [];

    document.getElementById('statTotal').textContent      = data.total;
    document.getElementById('statPending').textContent    = items.filter(c => c.status === 'pending').length;
    document.getElementById('statInProgress').textContent = items.filter(c => c.status === 'in_progress' || c.status === 'assigned').length;
    document.getElementById('statResolved').textContent   = items.filter(c => c.status === 'resolved'   || c.status === 'closed').length;

    const tbody = document.getElementById('recentTable');
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">
        No complaints yet.
        <a href="/frontend/pages/student/create-complaint.html">Submit your first one.</a>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = items.slice(0, 8).map(c => `
      <tr>
        <td class="text-muted small">#${c.id}</td>
        <td class="fw-semibold">${c.title}</td>
        <td><span class="badge bg-light text-dark border">${c.category}</span></td>
        <td>${priorityBadge(c.priority)}</td>
        <td>${statusBadge(c.status)}</td>
        <td class="text-muted small">${formatDateShort(c.created_at)}</td>
        <td><a href="/frontend/pages/student/complaint-detail.html?id=${c.id}"
               class="btn btn-sm btn-outline-secondary">View</a></td>
      </tr>`).join('');

  } catch (err) {
    document.getElementById('recentTable').innerHTML =
      `<tr><td colspan="7" class="text-center text-danger py-3">
         ${err.detail || err.message || 'Failed to load complaints'}
       </td></tr>`;
  }
  } catch (err) {
    console.error('Page initialization error:', err);
  }
})();
</script>
</body>
</html>
