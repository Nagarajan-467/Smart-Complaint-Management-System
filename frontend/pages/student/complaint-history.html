<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Complaints — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <!-- Filters -->
  <div class="card table-card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-sm-4 col-md-3">
          <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search complaints…">
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <select class="form-select form-select-sm" id="statusFilter">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="assigned">Assigned</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
            <option value="escalated">Escalated</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <select class="form-select form-select-sm" id="priorityFilter">
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <select class="form-select form-select-sm" id="sortFilter">
            <option value="created_at_desc">Newest First</option>
            <option value="created_at_asc">Oldest First</option>
            <option value="priority">By Priority</option>
            <option value="status">By Status</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 col-md-3 d-flex gap-2">
          <button class="btn btn-primary btn-sm" onclick="loadComplaints(1)">
            <i class="bi bi-search me-1"></i>Filter
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()">
            <i class="bi bi-x-circle me-1"></i>Reset
          </button>
          <a href="create-complaint.html" class="btn btn-success btn-sm ms-auto">
            <i class="bi bi-plus"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card table-card">
    <div class="card-header bg-white d-flex align-items-center justify-content-between py-3">
      <h6 class="mb-0 fw-bold">My Complaints</h6>
      <span class="badge bg-secondary" id="totalBadge">—</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th><th>Title</th><th>Category</th><th>Priority</th>
              <th>Status</th><th>Est. Hours</th><th>Date</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="complaintsTable"></tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white" id="paginationContainer"></div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  (async () => {
    try {
      const user = await SCMComponents.init('My Complaints', ['student']);
      if (!user) return;

      const { showToast, priorityBadge, statusBadge, formatDateShort, renderPagination } = SCMUtils;
      const PAGE_SIZE = 10;
      let currentPage = 1;

      async function loadComplaints(page = 1) {
    currentPage = page;
    const search   = document.getElementById('searchInput').value.trim();
    const status   = document.getElementById('statusFilter').value;
    const priority = document.getElementById('priorityFilter').value;
    const sort_by  = document.getElementById('sortFilter').value;

    const tbody = document.getElementById('complaintsTable');
    tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>`;

    try {
      const data = await API.listComplaints({ page, size: PAGE_SIZE, search, status, priority, sort_by });
      const items = data.items || [];
      document.getElementById('totalBadge').textContent = `${data.total} total`;

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-inbox"></i><p>No complaints found</p></div></td></tr>`;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      tbody.innerHTML = items.map(c => `
        <tr>
          <td class="text-muted small">#${c.id}</td>
          <td>
            ${c.duplicate_of ? '<i class="bi bi-copy text-warning me-1" title="Possible duplicate"></i>' : ''}
            ${c.escalation_level > 0 ? `<i class="bi bi-exclamation-triangle text-danger me-1" title="Escalated L${c.escalation_level}"></i>` : ''}
            ${c.title}
          </td>
          <td><span class="badge bg-light text-dark border">${c.category}</span></td>
          <td>${priorityBadge(c.priority)}</td>
          <td>${statusBadge(c.status)}</td>
          <td class="text-muted small">${c.estimated_resolution_hours ? c.estimated_resolution_hours.toFixed(1) + 'h' : '—'}</td>
          <td class="text-muted small">${formatDateShort(c.created_at)}</td>
          <td>
            <a href="complaint-detail.html?id=${c.id}" class="btn btn-sm btn-outline-primary me-1">View</a>
            ${c.status === 'pending' ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteComplaint(${c.id})"><i class="bi bi-trash"></i></button>` : ''}
          </td>
        </tr>`).join('');

      const totalPages = Math.ceil(data.total / PAGE_SIZE);
      renderPagination('paginationContainer', currentPage, totalPages, loadComplaints);
    } catch (err) {
      showToast(err.detail || 'Failed to load complaints', 'danger');
    }
  }

  async function deleteComplaint(id) {
    if (!confirm('Delete this complaint?')) return;
    try {
      await API.deleteComplaint(id);
      showToast('Complaint deleted.', 'success');
      loadComplaints(currentPage);
    } catch (err) {
      showToast(err.detail || 'Delete failed.', 'danger');
    }
  }

  function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('priorityFilter').value = '';
    document.getElementById('sortFilter').value = 'created_at_desc';
      loadComplaints(1);
    } catch (err) {
      console.error('Page initialization error:', err);
    }
  })();
</script>
</body>
</html>
