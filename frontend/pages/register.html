<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="card auth-card p-4" style="max-width:520px;">
    <div class="text-center mb-4">
      <i class="bi bi-shield-check auth-logo"></i>
      <h4 class="mt-2 fw-bold">Create Account</h4>
      <p class="text-muted small">Smart Complaint Management System</p>
    </div>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="registerForm" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="full_name" placeholder="Your full name" required minlength="1" maxlength="100">
          <div class="invalid-feedback">Full name is required.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="username" placeholder="username" required minlength="3" maxlength="50">
          <div class="invalid-feedback">Min 3 characters.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
          <div class="invalid-feedback">Valid email required.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="password" placeholder="Min 8 characters" required minlength="8">
          <div class="invalid-feedback">Min 8 characters.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
          <div class="invalid-feedback">Passwords must match.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Phone</label>
          <input type="tel" class="form-control" id="phone" placeholder="Optional" maxlength="20">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
          <select class="form-select" id="role" required>
            <option value="student" selected>Student</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-semibold mt-4" id="submitBtn">
        <span id="btnText">Create Account</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Already have an account? <a href="login.html" class="fw-semibold">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const alertBox = document.getElementById('alertBox');

    const full_name      = document.getElementById('full_name').value.trim();
    const username       = document.getElementById('username').value.trim();
    const email          = document.getElementById('email').value.trim();
    const password       = document.getElementById('password').value;
    const confirmPwd     = document.getElementById('confirmPassword').value;
    const phone          = document.getElementById('phone').value.trim() || null;
    const role           = document.getElementById('role').value;

    form.classList.add('was-validated');

    // Custom password match validation
    const confirmEl = document.getElementById('confirmPassword');
    if (password !== confirmPwd) {
      confirmEl.setCustomValidity('Passwords must match.');
    } else {
      confirmEl.setCustomValidity('');
    }

    if (!form.checkValidity()) return;

    document.getElementById('btnText').textContent = 'Creating…';
    document.getElementById('btnSpinner').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;
    alertBox.classList.add('d-none');

    try {
      await API.register({ full_name, username, email, password, phone, role });
      alertBox.className = 'alert alert-success';
      alertBox.innerHTML = '<i class="bi bi-check-circle me-2"></i>Account created! Redirecting to login…';
      alertBox.classList.remove('d-none');
      setTimeout(() => location.href = '/frontend/pages/login.html', 1800);
    } catch (err) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = err.detail || err.message || JSON.stringify(err) || 'Registration failed. Please try again.';
      alertBox.classList.remove('d-none');
      document.getElementById('btnText').textContent = 'Create Account';
      document.getElementById('btnSpinner').classList.add('d-none');
      document.getElementById('submitBtn').disabled = false;
    }
  });

  // Live confirm password check
  document.getElementById('confirmPassword').addEventListener('input', function () {
    const pwd = document.getElementById('password').value;
    this.setCustomValidity(this.value !== pwd ? 'Passwords must match.' : '');
  });
</script>
</body>
</html>
