<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="card auth-card p-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-check auth-logo"></i>
      <h4 class="mt-2 fw-bold">Smart Complaint Manager</h4>
      <p class="text-muted small">Sign in to continue</p>
    </div>

    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" placeholder="Enter username" required>
        </div>
        <div class="invalid-feedback">Username is required.</div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="invalid-feedback">Password is required.</div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100 fw-semibold" id="submitBtn">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="register.html" class="fw-semibold">Register</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (API.getToken()) {
    const u = API.getCachedUser();
    const role = u?.role;
    if (role === 'admin') location.href = '/frontend/pages/admin/dashboard.html';
    else if (role === 'staff') location.href = '/frontend/pages/staff/dashboard.html';
    else location.href = '/frontend/pages/student/dashboard.html';
  }

  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('#togglePwd i');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  // Login form submit It is used for logging into the system.
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const alertBox = document.getElementById('alertBox');

    // Basic validation
    form.classList.add('was-validated');
    if (!username || !password) return;

    // Show spinner
    document.getElementById('btnText').textContent = 'Signing in…';
    document.getElementById('btnSpinner').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;
    alertBox.classList.add('d-none');

    try {
      const data = await API.login(username, password);
      API.setToken(data.access_token);

      // Fetch user profile and cache it
      const user = await API.getMe();
      API.setCachedUser(user);

      // Role-based redirect
      if (user.role === 'admin')       location.href = '/frontend/pages/admin/dashboard.html';
      else if (user.role === 'staff')  location.href = '/frontend/pages/staff/dashboard.html';
      else                             location.href = '/frontend/pages/student/dashboard.html';
    } catch (err) {
      alertBox.textContent = err.detail || err.message || 'Login failed. Please try again.';
      alertBox.classList.remove('d-none');
      document.getElementById('btnText').textContent = 'Sign In';
      document.getElementById('btnSpinner').classList.add('d-none');
      document.getElementById('submitBtn').disabled = false;
    }
  });
</script>
</body>
</html>
