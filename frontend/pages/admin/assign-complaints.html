<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assign Complaints — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <!-- Filters -->
  <div class="card table-card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-sm-5">
          <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search complaints…">
        </div>
        <div class="col-6 col-sm-3">
          <select class="form-select form-select-sm" id="statusFilter">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="assigned">Assigned</option>
            <option value="in_progress">In Progress</option>
            <option value="escalated">Escalated</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 d-flex gap-2">
          <button class="btn btn-primary btn-sm" onclick="loadComplaints(1)"><i class="bi bi-search me-1"></i>Filter</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()"><i class="bi bi-x-circle"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="card table-card">
    <div class="card-header bg-white d-flex align-items-center justify-content-between py-3">
      <h6 class="mb-0 fw-bold">Complaint Assignment</h6>
      <span class="badge bg-secondary" id="totalBadge">—</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr><th>#</th><th>Title</th><th>Priority</th><th>Status</th><th>Assigned To</th><th>Escalation</th><th>Actions</th></tr>
          </thead>
          <tbody id="complaintsTable"></tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white" id="paginationContainer"></div>
  </div>
</div>

<!-- Assign Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">Assign Complaint #<span id="modalComplaintId"></span></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label fw-semibold">Assign to Staff ID</label>
        <input type="number" class="form-control" id="assignUserId" placeholder="Enter user ID" min="1">
        <div class="form-text">Enter the user ID of the staff member to assign.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="confirmAssign()">Assign</button>
      </div>
    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  const { showToast, priorityBadge, statusBadge, formatDateShort, renderPagination } = SCMUtils;
  const PAGE_SIZE = 10;
  let currentPage = 1;
  let assignModalComplaintId = null;
  const assignModal = new bootstrap.Modal(document.getElementById('assignModal'));

  function openAssignModal(id) {
    assignModalComplaintId = id;
    document.getElementById('modalComplaintId').textContent = id;
    document.getElementById('assignUserId').value = '';
    assignModal.show();
  }

  async function confirmAssign() {
    const userId = parseInt(document.getElementById('assignUserId').value);
    if (!userId || userId < 1) { showToast('Enter a valid user ID.', 'warning'); return; }
    try {
      await API.assignComplaint(assignModalComplaintId, userId);
      showToast(`Complaint #${assignModalComplaintId} assigned to user #${userId}`, 'success');
      assignModal.hide();
      loadComplaints(currentPage);
    } catch (err) {
      showToast(err.detail || 'Assignment failed.', 'danger');
    }
  }

  async function loadComplaints(page = 1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value.trim();
    const status = document.getElementById('statusFilter').value;
    const tbody  = document.getElementById('complaintsTable');
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>`;

    try {
      const data = await API.listComplaints({ page, size: PAGE_SIZE, search, status });
      const items = data.items || [];
      document.getElementById('totalBadge').textContent = `${data.total} total`;

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-inbox"></i><p>No complaints found</p></div></td></tr>`;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      tbody.innerHTML = items.map(c => `
        <tr>
          <td class="text-muted small">#${c.id}</td>
          <td>${c.title}</td>
          <td>${priorityBadge(c.priority)}</td>
          <td>${statusBadge(c.status)}</td>
          <td class="text-muted small">${c.assigned_to ? `#${c.assigned_to}` : '<span class="badge bg-light text-dark">Unassigned</span>'}</td>
          <td>${c.escalation_level > 0 ? `<span class="badge bg-danger">L${c.escalation_level}</span>` : '—'}</td>
          <td>
            <button class="btn btn-sm btn-primary me-1" onclick="openAssignModal(${c.id})">Assign</button>
            <a href="../student/complaint-detail.html?id=${c.id}" class="btn btn-sm btn-outline-secondary">View</a>
          </td>
        </tr>`).join('');

      renderPagination('paginationContainer', currentPage, Math.ceil(data.total / PAGE_SIZE), loadComplaints);
    } catch (err) {
      showToast(err.detail || 'Failed to load.', 'danger');
    }
  }

  function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    loadComplaints(1);
  }

  (async () => {
    const user = await SCMComponents.init('Assign Complaints', ['admin']);
    if (!user) return;
    loadComplaints(1);
  })();
</script>
</body>
</html>
