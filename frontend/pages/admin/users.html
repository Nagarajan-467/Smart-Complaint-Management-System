<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Users — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <div class="row g-3">
    <!-- Current admin profile -->
    <div class="col-md-5">
      <div class="card table-card p-3 mb-3">
        <h6 class="fw-bold mb-3"><i class="bi bi-person-circle me-2 text-primary"></i>Admin Profile</h6>
        <div id="profileSection"><div class="spinner-border spinner-border-sm text-primary"></div></div>
      </div>
    </div>

    <!-- Register new user -->
    <div class="col-md-7">
      <div class="card table-card p-3">
        <h6 class="fw-bold mb-3"><i class="bi bi-person-plus me-2 text-success"></i>Register New User</h6>
        <div id="regAlert" class="alert d-none mb-2"></div>
        <form id="regForm" novalidate>
          <div class="row g-2">
            <div class="col-md-6">
              <input type="text" class="form-control form-control-sm" id="rFullName" placeholder="Full name *" required>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control form-control-sm" id="rUsername" placeholder="Username *" required minlength="3">
            </div>
            <div class="col-md-6">
              <input type="email" class="form-control form-control-sm" id="rEmail" placeholder="Email *" required>
            </div>
            <div class="col-md-6">
              <input type="password" class="form-control form-control-sm" id="rPassword" placeholder="Password *" required minlength="8">
            </div>
            <div class="col-md-6">
              <select class="form-select form-select-sm" id="rRole" required>
                <option value="student">Student</option>
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="col-md-6">
              <input type="tel" class="form-control form-control-sm" id="rPhone" placeholder="Phone (optional)">
            </div>
          </div>
          <button type="submit" class="btn btn-success btn-sm mt-2">
            <i class="bi bi-person-plus me-1"></i>Create User
          </button>
        </form>
      </div>
    </div>

    <!-- Info notice -->
    <div class="col-12">
      <div class="alert alert-info d-flex align-items-start gap-2">
        <i class="bi bi-info-circle-fill mt-1"></i>
        <div>
          <strong>User List API</strong><br>
          <span class="small">A full user listing endpoint (GET /api/v1/users/) will be available in a future module.
          Currently, users can be created here and managed via the authentication APIs.</span>
        </div>
      </div>
    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  const { showToast, formatDate } = SCMUtils;

  (async () => {
    const user = await SCMComponents.init('User Management', ['admin']);
    if (!user) return;

    // Render admin profile
    document.getElementById('profileSection').innerHTML = `
      <div class="d-flex align-items-center gap-3 mb-3">
        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white"
             style="width:52px;height:52px;font-size:1.4rem;flex-shrink:0;">
          ${user.full_name.charAt(0).toUpperCase()}
        </div>
        <div>
          <div class="fw-bold">${user.full_name}</div>
          <div class="text-muted small">${user.email}</div>
          <span class="badge bg-primary">${user.role}</span>
        </div>
      </div>
      <table class="table table-sm table-borderless">
        <tr><td class="text-muted">Username</td><td class="fw-semibold">${user.username}</td></tr>
        <tr><td class="text-muted">Phone</td><td>${user.phone || '—'}</td></tr>
        <tr><td class="text-muted">Active</td><td>${user.is_active ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-danger">No</span>'}</td></tr>
        <tr><td class="text-muted">Member Since</td><td class="small">${formatDate(user.created_at)}</td></tr>
      </table>`;

    // Register form
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;

      const alertEl = document.getElementById('regAlert');
      try {
        await API.register({
          full_name: document.getElementById('rFullName').value.trim(),
          username:  document.getElementById('rUsername').value.trim(),
          email:     document.getElementById('rEmail').value.trim(),
          password:  document.getElementById('rPassword').value,
          role:      document.getElementById('rRole').value,
          phone:     document.getElementById('rPhone').value.trim() || null,
        });
        alertEl.className = 'alert alert-success';
        alertEl.innerHTML = '<i class="bi bi-check-circle me-2"></i>User created successfully!';
        alertEl.classList.remove('d-none');
        form.reset();
        form.classList.remove('was-validated');
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.detail || 'Failed to create user.';
        alertEl.classList.remove('d-none');
      }
    });
  })();
</script>
</body>
</html>
