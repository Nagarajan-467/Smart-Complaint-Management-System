<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard — SCM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/css/app.css" rel="stylesheet">
</head>
<body>
<div class="scm-wrapper">
  <div class="scm-sidebar" id="scm-sidebar"></div>
  <div class="scm-main">
    <nav class="navbar scm-navbar px-3 d-flex align-items-center justify-content-between" id="scm-navbar"></nav>
    <div class="scm-content">
  <!-- Stats Row -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-collection"></i></div>
          <div><div class="fw-bold fs-4" id="statTotal">—</div><div class="text-muted small">Total</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-hourglass-split"></i></div>
          <div><div class="fw-bold fs-4" id="statPending">—</div><div class="text-muted small">Pending</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="bi bi-exclamation-octagon"></i></div>
          <div><div class="fw-bold fs-4" id="statEscalated">—</div><div class="text-muted small">Escalated</div></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle"></i></div>
          <div><div class="fw-bold fs-4" id="statResolved">—</div><div class="text-muted small">Resolved</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions + Scheduler -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card border-0 rounded-3 shadow-sm h-100 p-3">
        <h6 class="fw-bold mb-3"><i class="bi bi-lightning-charge me-2 text-warning"></i>Quick Actions</h6>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-outline-primary btn-sm" onclick="triggerEscalation()">
            <i class="bi bi-exclamation-octagon me-1"></i>Run Escalation
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="triggerClustering()">
            <i class="bi bi-diagram-3 me-1"></i>Run Clustering
          </button>
          <a href="assign-complaints.html" class="btn btn-outline-info btn-sm">
            <i class="bi bi-person-check me-1"></i>Assign Complaints
          </a>
          <a href="analytics.html" class="btn btn-outline-success btn-sm">
            <i class="bi bi-bar-chart-line me-1"></i>View Analytics
          </a>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card border-0 rounded-3 shadow-sm h-100 p-3">
        <h6 class="fw-bold mb-3"><i class="bi bi-clock-history me-2 text-primary"></i>Scheduler Status</h6>
        <div id="schedulerInfo"><div class="spinner-border spinner-border-sm text-primary"></div></div>
      </div>
    </div>
  </div>

  <!-- Recent Complaints -->
  <div class="card table-card">
    <div class="card-header bg-white d-flex align-items-center justify-content-between py-3">
      <h6 class="mb-0 fw-bold">Recent Complaints (All)</h6>
      <a href="assign-complaints.html" class="btn btn-sm btn-outline-primary">Manage</a>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr><th>#</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Escalation</th><th>Date</th></tr>
          </thead>
          <tbody id="recentTable"></tbody>
        </table>
      </div>
    </div>
  </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/utils.js"></script>
<script src="/frontend/js/components.js"></script>
<script>
  const { showToast, showLoading, priorityBadge, statusBadge, formatDateShort } = SCMUtils;

  async function triggerEscalation() {
    showLoading(true);
    try {
      const result = await API.runEscalation();
      showToast(`Escalation complete — Notified: ${result.notified}, Escalated: ${result.escalated}, Critical: ${result.critical}`, 'success');
      loadDashboard();
    } catch (err) {
      showToast(err.detail || 'Escalation failed.', 'danger');
    } finally { showLoading(false); }
  }

  async function triggerClustering() {
    showLoading(true);
    try {
      const result = await API.runClustering();
      showToast(`Clustering complete — ${result.complaints_clustered} complaints clustered.`, 'success');
    } catch (err) {
      showToast(err.detail || 'Clustering failed.', 'danger');
    } finally { showLoading(false); }
  }

  async function loadSchedulerStatus() {
    try {
      const s = await API.getSchedulerStatus();
      const job = s.jobs?.[0];
      document.getElementById('schedulerInfo').innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-2">
          <span class="badge ${s.running ? 'bg-success' : 'bg-danger'}">${s.running ? 'Running' : 'Stopped'}</span>
          <span class="text-muted small">Escalation Scheduler</span>
        </div>
        ${job ? `<div class="text-muted small"><i class="bi bi-calendar-check me-1"></i>Next run: ${new Date(job.next_run_time).toLocaleString()}</div>` : ''}`;
    } catch {
      document.getElementById('schedulerInfo').innerHTML = '<span class="text-muted small">Status unavailable</span>';
    }
  }

  async function loadDashboard() {
    try {
      const data = await API.listComplaints({ page: 1, size: 100 });
      const all = data.items || [];

      document.getElementById('statTotal').textContent    = data.total;
      document.getElementById('statPending').textContent  = all.filter(c => c.status === 'pending').length;
      document.getElementById('statEscalated').textContent= all.filter(c => c.status === 'escalated' || c.escalation_level > 0).length;
      document.getElementById('statResolved').textContent = all.filter(c => c.status === 'resolved').length;

      const recent = all.slice(0, 10);
      const tbody  = document.getElementById('recentTable');
      if (!recent.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-inbox"></i><p>No complaints yet</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = recent.map(c => `
        <tr>
          <td class="text-muted small">#${c.id}</td>
          <td>${c.title}</td>
          <td><span class="badge bg-light text-dark border">${c.category}</span></td>
          <td>${priorityBadge(c.priority)}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${c.escalation_level > 0 ? `<span class="badge bg-danger">L${c.escalation_level}</span>` : '<span class="text-muted">—</span>'}</td>
          <td class="text-muted small">${formatDateShort(c.created_at)}</td>
        </tr>`).join('');
    } catch (err) {
      showToast(err.detail || 'Failed to load data.', 'danger');
    }
  }

  (async () => {
    const user = await SCMComponents.init('Admin Dashboard', ['admin']);
    if (!user) return;
    loadDashboard();
    loadSchedulerStatus();
  })();
</script>
</body>
</html>
