<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Complaint Manager</title>
  <script src="js/api.js"></script>
  <script>
    (function () {
      const token = localStorage.getItem('scm_token');
      if (!token) { window.location.href = 'pages/login.html'; return; }
      const user = JSON.parse(localStorage.getItem('scm_user') || 'null');
      const role = user?.role;
      if (role === 'admin')   { window.location.href = 'pages/admin/dashboard.html'; }
      else if (role === 'staff') { window.location.href = 'pages/staff/dashboard.html'; }
      else                    { window.location.href = 'pages/student/dashboard.html'; }
    })();
  </script>
</head>
<body></body>
</html>
